name: Open Website Daily
on:
  schedule:
    - cron: '30 13 * * *' # 7:00 PM IST
  workflow_dispatch:      # <--- ADD THIS LINE TO ENABLE MANUAL TESTING
jobs:
  open_url:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Website
        run: |
          # The -m 30 tells curl to stay "active" for 30 seconds
          curl -L -m 30 "https://badmic909.github.io/Inventory/post.html?key=${{ secrets.MY_REPORT_KEY }}"
