
name: Open Website Daily
on:
  schedule:
    - cron: '20 07 * * *' # 7:00 PM IST
jobs:
  open_url:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: npm install playwright
      - name: Run Script
        env:
          KEY1: ${{ secrets.MY_REPORT_KEY }}
          KEY2: ${{ secrets.ACK }}
        run: node trigger.js
