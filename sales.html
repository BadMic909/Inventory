          <td style="padding:10px; border-bottom:1px solid #eee; text-align:center;">${i.qty}</td>
          <td style="padding:10px; border-bottom:1px solid #eee; text-align:center;">₹${i.price.toLocaleString()}</td>
          <td style="padding:10px; border-bottom:1px solid #eee; text-align:right;">₹${lineTotal.toLocaleString()}</td>
        </tr>`;
    }).join("");

    const element = document.createElement('div');
    element.innerHTML = `
      <div style="padding:40px; font-family:'Poppins', sans-serif; color: #333;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #1cc88a; padding-bottom:15px;">
          <div style="flex: 1;">
            <img src="${logoBase64}" style="height:90px; display: block;">
          </div>
          <div style="text-align:right; flex: 1;">
            <h1 style="margin:0; color:#2c3e50; font-size: 24px;">TAX INVOICE</h1>
            <p style="margin:5px 0; color:#7f8c8d; font-weight:600;">#SALE-${saleNo}</p>
            <p style="margin:0; color:#7f8c8d; font-size: 14px;">Date: ${new Date().toLocaleDateString()}</p>
          </div>
        </div>

        <div style="margin-top:30px; display: flex; justify-content: space-between;">
          <div>
            <p style="margin:0; color:#7f8c8d; font-size: 12px; text-transform: uppercase;">Billed To</p>
            <h3 style="margin:5px 0; color:#2c3e50;">${customer}</h3>
          </div>
          <div style="text-align: right;">
            <p style="margin:0; color:#7f8c8d; font-size: 12px; text-transform: uppercase;">Status</p>
            <h3 style="margin:5px 0; color:${color};">${Pay}</h3>
          </div>
        </div>

        <table style="width:100%; border-collapse:collapse; margin-top:30px;">
          <thead>
            <tr style="background:#f8f9fc; color:#2c3e50;">
              <th style="padding:12px; text-align:left; border-bottom:2px solid #e3e6f0; font-size: 13px;">Item Description</th>
              <th style="padding:12px; text-align:center; border-bottom:2px solid #e3e6f0; font-size: 13px;">Qty</th>
              <th style="padding:12px; text-align:center; border-bottom:2px solid #e3e6f0; font-size: 13px;">Price</th>
              <th style="padding:12px; text-align:right; border-bottom:2px solid #e3e6f0; font-size: 13px;">Total</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
          </tbody>
        </table>

        <div style="margin-top:30px; border-top: 2px solid #f8f9fc; padding-top: 10px;">
          <div style="display: flex; justify-content: flex-end;">
            <div style="width: 200px;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color:#7f8c8d;">Subtotal:</span>
                <span>₹${total.toLocaleString()}</span>
              </div>
              <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; color: #2c3e50; border-top: 1px solid #eee; padding-top: 10px;">
                <span>Grand Total:</span>
                <span>₹${total.toLocaleString()}</span>
              </div>
            </div>
          </div>
        </div>

        <div style="text-align:center; margin-top:80px; border-top:1px solid #eee; padding-top:20px;">
          <h3 style="color:#1cc88a; margin-bottom:5px;">Thank you for your business!</h3>
          <p style="margin:0; font-size:12px; color:#95a5a6;">Evergreen Golf | Premium Golf Equipment</p>
          <p style="margin:0; font-size:12px; color:#95a5a6;">www.evergreengolfindia.com</p>
        </div>
      </div>`;

const opt = {
  margin: 0.25,
  filename: `Invoice_${saleNo}.pdf`,
  image: { type: 'jpeg', quality: 0.98 },
  html2canvas: { 
    scale: 3, 
    useCORS: true, 
    logging: false,
    letterRendering: true 
  },
  jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
};
    html2pdf().from(element).set(opt).save();
  };
  async function fetchData() {
    const { data: sales } = await supabase.from("Sales").select("*").order("id", { ascending: false });
    const { data: stock } = await supabase.from("Stock").select("*");
    salesData = sales || []; 
    stockData = stock || [];
  }

  function renderTable() {
    tbody.innerHTML = "";
    salesData.forEach(row => {
      const itemsHtml = (row.Item_RP || []).map(i => {
        const s = stockData.find(x => x.Barcode == i.barcode);
        return `<div>${s ? s.Item_Name : '??'} | ${i.qty || 1} @ ₹${i.price}</div>`;
      }).join("");

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.Sale_No}</td>
        <td>${row.Customer_Name}</td>
        <td>${itemsHtml}</td>
        <td>₹${(row.Invoice || 0).toLocaleString()}</td>
        <td class="action-btns">
          <button class="saveBtn" onclick="enterEditMode(${row.id})">Edit</button>
          <button class="deleteBtn" onclick="deleteSale(${row.id})">Delete</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  window.deleteSale = async (id) => {
    if(confirm("Delete this sale record?")) {
      await supabase.from("Sales").delete().eq("id", id);
      await fetchData(); renderTable();
    }
  };

  window.enterEditMode = (id) => {
    const sale = salesData.find(s => s.id == id);
    const tr = [...tbody.children].find(r => r.children[0].textContent == id);
    tr.innerHTML = `
      <td>${sale.id}</td>
      <td><input type="number" class="saleNoInput" value="${sale.Sale_No}"></td>
      <td><input type="text" class="customerInput" value="${sale.Customer_Name || ''}"></td>
      <td><div class="itemsContainer"></div><button class="addBtn" onclick="addItemRow(this)">+ Item</button></td>
      <td class="invoiceCell">₹0</td>
      <td class="action-btns">
        <button class="saveBtn" onclick="saveSale(${id}, this)">Complete Sale</button>
        <button class="addBtn" style="background:#f39c12" onclick="downloadInvoice(${id}, this)">PDF Invoice</button>
        <button class="cancelBtn" onclick="location.reload()">Cancel</button>
      </td>
    `;
    const container = tr.querySelector(".itemsContainer");
    (sale.Item_RP || []).forEach(i => addItemRow(null, container, i.barcode, i.price, i.qty));
    updateTotalLive(tr);
  };

  window.addItemRow = (btn, container, bc="", pr="", qty=1) => {
    const target = container || btn.previousElementSibling;
    const div = document.createElement("div");
    div.className = "itemRow";
    div.style.marginBottom = "8px";
    div.innerHTML = `
      <input type="text" class="bc" value="${bc}" placeholder="Barcode" style="width:90px">
      <input type="number" class="qtyInput" value="${qty}" style="width:50px">
      <input type="number" class="pr" value="${pr}" placeholder="Price" style="width:80px">
      <button class="deleteBtn" style="padding: 2px 8px;" onclick="this.parentElement.remove(); updateTotalLive(this.closest('tr'))">x</button>
    `;
    target.appendChild(div);

    // Live Listeners for Total and Autocomplete
    const bcInp = div.querySelector(".bc");
    const qtyInp = div.querySelector(".qtyInput");
    const prInp = div.querySelector(".pr");

    [bcInp, qtyInp, prInp].forEach(input => {
      input.addEventListener("input", () => {
        if(input === bcInp) {
          const s = stockData.find(x => x.Barcode == bcInp.value.trim());
          if(s) prInp.value = s.MRP;
        }
        updateTotalLive(div.closest("tr"));
      });
    });
  };

  window.updateTotalLive = (tr) => {
    let total = 0;
    tr.querySelectorAll(".itemRow").forEach(row => {
      const q = parseFloat(row.querySelector(".qtyInput").value) || 0;
      const p = parseFloat(row.querySelector(".pr").value) || 0;
      total += (q * p);
    });
    tr.querySelector(".invoiceCell").textContent = "₹" + total.toLocaleString();
  };

window.saveSale = async (id, btn) => {
  const tr = btn.closest("tr");
  
  // 1. Get the NEW values from the form
  const newItems = [...tr.querySelectorAll(".itemRow")].map(r => ({
    barcode: r.querySelector(".bc").value.trim(),
    qty: parseInt(r.querySelector(".qtyInput").value) || 0,
    price: parseFloat(r.querySelector(".pr").value) || 0
  }));

  // 2. Fetch the OLD sale data to see what was previously deducted
  const { data: oldSale } = await supabase.from("Sales").select("Item_RP").eq("id", id).single();
  const oldItems = oldSale ? oldSale.Item_RP : [];

  // 3. Stock Validation Check
  for (const newItem of newItems) {
    const s = stockData.find(x => x.Barcode == newItem.barcode);
    const oldItem = oldItems.find(oi => oi.barcode === newItem.barcode);
    const oldQty = oldItem ? oldItem.qty : 0;
    
    // Effective stock available = Current Stock + What we previously sold
    const effectiveStock = (s ? s.QTY : 0) + oldQty;

    if (!s || effectiveStock < newItem.qty) {
      showWarning(`Item: ${s ? s.Item_Name : newItem.barcode}<br>Available: ${effectiveStock} | Req: ${newItem.qty}`);
      return;
    }else{if(0 >= newItem.qty){
      showWarning(`Item: ${s ? s.Item_Name : newItem.barcode}<br>You can't request Negative quantity: ${newItem.qty}`);
      return;
    }}
  }

  // 4. Update Stock (The Logic: Return Old, Subtract New)
  // First, "Return" all old items to stock
  for (const oldItem of oldItems) {
    const s = stockData.find(x => x.Barcode == oldItem.barcode);
    if (s) {
      const { data: currentStock } = await supabase.from("Stock").select("QTY").eq("Barcode", oldItem.barcode).single();
      await supabase.from("Stock").update({ QTY: currentStock.QTY + oldItem.qty }).eq("Barcode", oldItem.barcode);
    }
  }

  // Second, "Subtract" all new items from stock
  for (const newItem of newItems) {
    const { data: currentStock } = await supabase.from("Stock").select("QTY").eq("Barcode", newItem.barcode).single();
    await supabase.from("Stock").update({ QTY: currentStock.QTY - newItem.qty }).eq("Barcode", newItem.barcode);
  }

  // 5. Update the Sale record
  const total = newItems.reduce((a, b) => a + (b.price * b.qty), 0);
  await supabase.from("Sales").update({
    Sale_No: Number(tr.querySelector(".saleNoInput").value),
    Customer_Name: tr.querySelector(".customerInput").value,
    Item_RP: newItems,
    Invoice: total
  }).eq("id", id);

  alert("Sale Updated & Stock Adjusted!");
  await fetchData(); 
  renderTable();
};

  window.showWarning = (msg) => {
    document.getElementById("warningText").innerHTML = msg;
    document.getElementById("warningModal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
  };
  window.closeWarning = () => {
    document.getElementById("warningModal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
  };

  document.getElementById("addSaleBtn").onclick = async () => {
    const { data } = await supabase.from("Sales").insert([{ Sale_No: 1, Item_RP: [], Invoice: 0, Customer_Name: "" }]).select().single();
    await fetchData(); renderTable(); enterEditMode(data.id);
  };

  await fetchData(); renderTable();
});
</script>
</body>
